<div class="page-wrapper">

  <!-- 404 -->
  <div *ngIf="notFound" class="empty-state">
    <div class="empty-icon">🔍</div>
    <h3>Entry not found</h3>
    <p>This entry may have been deleted or the link is incorrect.</p>
    <a routerLink="/" class="btn btn-primary" style="margin-top:1rem">Back to journal</a>
  </div>

  <!-- Post content -->
  <article *ngIf="post" class="post-article">
    <header class="post-header">
      <a routerLink="/" class="back-link">← All entries</a>
      <div class="post-meta-top">
        <time>{{ formatDate(post.createdAt) }}</time>
      </div>
      <h1 class="post-heading">{{ post.title }}</h1>
    </header>

    <hr class="divider">

    <div class="post-body">
      <p *ngFor="let para of paragraphs">{{ para }}</p>
    </div>

    <hr class="divider">

    <footer class="post-footer">
      <a routerLink="/" class="btn btn-ghost">← Back to journal</a>
      <button class="btn btn-danger" (click)="deletePost()">Delete entry</button>
    </footer>
  </article>

</div>
